<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS Executive – Group 2 Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; color: #1a1a1a; padding: 24px 16px; }
    .container { max-width: 960px; margin: 0 auto; }

    /* Header */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header p { font-size: 13px; color: #888; margin-top: 4px; }

    /* Summary cards */
    .summary-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
    .summary-card { background: #fff; border-radius: 10px; padding: 16px; text-align: center; }
    .summary-card .num { font-size: 26px; font-weight: 700; }
    .summary-card .lbl { font-size: 12px; color: #888; margin-top: 4px; }

    /* Section titles */
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

    /* Chart section */
    .charts-section { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
    .chart-wrap { position: relative; height: 240px; }

    /* Analysis section */
    .analysis-section { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
    .analysis-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
    .analysis-card { border-radius: 10px; padding: 14px 16px; }
    .analysis-card.urgent { background: #fdecea; }
    .analysis-card.warn   { background: #fff8e1; }
    .analysis-card.good   { background: #e6f4ea; }
    .a-subject { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .a-msg     { font-size: 12px; color: #555; line-height: 1.5; }

    /* Subject cards */
    .subject-card { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .subject-name { font-size: 16px; font-weight: 700; }
    .exam-date    { font-size: 12px; color: #888; margin-top: 3px; }
    .last-studied { font-size: 12px; color: #aaa; margin-top: 2px; }
    .days-badge   { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .days-ok      { background: #e6f4ea; color: #2e7d32; }
    .days-warn    { background: #fff8e1; color: #f57f17; }
    .days-urgent  { background: #fdecea; color: #c62828; }

    /* 4 progress bars per subject */
    .progress-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
    .prog-label { font-size: 11px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .prog-bg    { background: #eee; border-radius: 4px; height: 6px; }
    .prog-fill  { height: 6px; border-radius: 4px; transition: width 0.3s; }
    .prog-lec { background: #2196f3; }
    .prog-r1  { background: #ff9800; }
    .prog-r2  { background: #9c27b0; }
    .prog-r3  { background: #4caf50; }

    /* Remaining badges */
    .remaining-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .rem-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #f5f5f5; color: #555; }

    /* Topics table */
    .topics-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .topics-table th { text-align: left; padding: 6px 8px; color: #888; font-weight: 600; border-bottom: 1px solid #eee; font-size: 12px; }
    .topics-table th.center { text-align: center; }
    .topics-table td { padding: 8px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    .topics-table td.center { text-align: center; }
    .topics-table tr:last-child td { border-bottom: none; }
    .row-done td:first-child { text-decoration: line-through; color: #bbb; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #4caf50; }

    @media (max-width: 600px) {
      .summary-row { grid-template-columns: repeat(2,1fr); }
      .progress-grid { grid-template-columns: repeat(2,1fr); }
      .topics-table th, .topics-table td { padding: 5px 3px; font-size: 11px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>CS Executive — Group 2 Exam Tracker</h1>
    <p id="today-label"></p>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="num" id="s-nextexam">—</div>
      <div class="lbl">Days to next exam</div>
    </div>
    <div class="summary-card">
      <div class="num" id="s-lec">0%</div>
      <div class="lbl">Lectures done</div>
    </div>
    <div class="summary-card">
      <div class="num" id="s-rev1">0%</div>
      <div class="lbl">Revision 1 done</div>
    </div>
    <div class="summary-card">
      <div class="num" id="s-remaining">—</div>
      <div class="lbl">Lectures remaining</div>
    </div>
  </div>

  <div class="charts-section">
    <div class="section-title">Progress by subject</div>
    <div class="chart-wrap">
      <canvas id="progress-chart"></canvas>
    </div>
  </div>

  <div class="analysis-section">
    <div class="section-title">Analysis — where to focus</div>
    <div class="analysis-grid" id="analysis-grid"></div>
  </div>

  <div id="subjects-wrapper"></div>

</div>
<script>
const subjects = [
  {
    id: "cmsl",
    name: "Capital Market & Securities Laws",
    examDate: "2026-06-02",
    topics: [
      "SEBI & Regulatory Framework",
      "Securities Contracts",
      "Depositories",
      "Listing Obligations (LODR)",
      "Takeover Code",
      "Insider Trading",
      "Issue of Capital (ICDR)",
      "Stock Exchanges"
    ]
  },
  {
    id: "ecipl",
    name: "Economic, Commercial & IP Laws",
    examDate: "2026-06-04",
    topics: [
      "Competition Law",
      "Consumer Protection",
      "Foreign Trade Policy",
      "Patents",
      "Trademarks",
      "Copyright",
      "Industrial Designs",
      "Geographical Indications"
    ]
  },
  {
    id: "dtax",
    name: "Direct Tax",
    examDate: "2026-06-06",
    topics: [
      "Basic Concepts & Residential Status",
      "Heads of Income — Salary",
      "Heads of Income — House Property",
      "Heads of Income — PGBP",
      "Heads of Income — Capital Gains",
      "Heads of Income — Other Sources",
      "Deductions (80C etc.)",
      "TDS / TCS",
      "Assessment & Appeals"
    ]
  },
  {
    id: "gst",
    name: "GST",
    examDate: "2026-06-06",
    topics: [
      "Basic Concepts & Levy",
      "Supply",
      "Registration",
      "Valuation",
      "Input Tax Credit",
      "Returns",
      "Payment",
      "Refunds",
      "Exemptions"
    ]
  }
];

function loadProgress() {
  const s = localStorage.getItem("cs-exec-v2");
  return s ? JSON.parse(s) : {};
}
function saveProgress(p) {
  localStorage.setItem("cs-exec-v2", JSON.stringify(p));
}
function daysUntil(dateStr) {
  const d = new Date(dateStr), t = new Date();
  t.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function fmtDate(dateStr) {
  return new Date(dateStr).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
}
function fmtTS(ts) {
  if (!ts) return "Not studied yet";
  return "Last studied: " + new Date(ts).toLocaleDateString("en-IN", {
    day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit"
  });
}
function pct(done, total) { return total ? Math.round((done/total)*100) : 0; }
function badgeClass(days) {
  if (days <= 14) return "days-urgent";
  if (days <= 30) return "days-warn";
  return "days-ok";
}

let chartInstance = null;

function render() {
  const progress = loadProgress();

  document.getElementById("today-label").textContent =
    "Today: " + new Date().toLocaleDateString("en-IN", {
      weekday:"long", day:"numeric", month:"long", year:"numeric"
    });

  let grandTotal=0, grandLec=0, grandR1=0, grandLecRemaining=0;

  const subStats = subjects.map(sub => {
    const sp = progress[sub.id] || {};
    const n = sub.topics.length;
    let lec=0, r1=0, r2=0, r3=0;
    sub.topics.forEach(t => {
      const tp = sp[t] || {};
      if (tp.lec) lec++;
      if (tp.r1)  r1++;
      if (tp.r2)  r2++;
      if (tp.r3)  r3++;
    });
    grandTotal += n;
    grandLec += lec;
    grandR1  += r1;
    grandLecRemaining += (n - lec);
    return {
      sub, n, lec, r1, r2, r3,
      lecPct: pct(lec,n), r1Pct: pct(r1,n),
      r2Pct:  pct(r2,n),  r3Pct: pct(r3,n)
    };
  });

  // Summary
  document.getElementById("s-lec").textContent       = pct(grandLec, grandTotal) + "%";
  document.getElementById("s-rev1").textContent      = pct(grandR1,  grandTotal) + "%";
  document.getElementById("s-remaining").textContent = grandLecRemaining + " topics";
  const upcoming = subjects.map(s => daysUntil(s.examDate)).filter(d => d >= 0);
  document.getElementById("s-nextexam").textContent  = upcoming.length ? Math.min(...upcoming) : "Done";

  // Chart
  const shortNames = subStats.map(s => {
    const n = s.sub.name;
    return n.length > 22 ? n.substring(0,20) + "…" : n;
  });
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById("progress-chart"), {
    type: "bar",
    data: {
      labels: shortNames,
      datasets: [
        { label: "Lectures",   data: subStats.map(s => s.lecPct), backgroundColor: "#2196f3" },
        { label: "Revision 1", data: subStats.map(s => s.r1Pct),  backgroundColor: "#ff9800" },
        { label: "Revision 2", data: subStats.map(s => s.r2Pct),  backgroundColor: "#9c27b0" },
        { label: "Revision 3", data: subStats.map(s => s.r3Pct),  backgroundColor: "#4caf50" }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: { y: { min:0, max:100, ticks: { callback: v => v+"%" } } },
      plugins: { legend: { position: "bottom" } }
    }
  });

  // Analysis
  document.getElementById("analysis-grid").innerHTML = subStats.map(({ sub, n, lec, r1, lecPct, r1Pct }) => {
    const days = daysUntil(sub.examDate);
    let cls, msg;
    if (lecPct < 40) {
      cls = "urgent";
      msg = `Only ${lecPct}% lectures done. ${n - lec} topics still to cover. Needs immediate attention!`;
    } else if (lecPct < 80) {
      cls = "warn";
      msg = `${lecPct}% lectures done. ${n - lec} topics left. Start Revision 1 soon.`;
    } else {
      cls = "good";
      msg = `Lectures almost done! Focus on revisions — ${n - r1} topics need Rev 1.`;
    }
    return `<div class="analysis-card ${cls}">
      <div class="a-subject">${sub.name}</div>
      <div class="a-msg">${msg}</div>
      <div class="a-msg" style="margin-top:6px;color:#999;">${days} days to exam</div>
    </div>`;
  }).join("");

  // Subject cards
  const wrapper = document.getElementById("subjects-wrapper");
  wrapper.innerHTML = "";
  subStats.forEach(({ sub, n, lec, r1, r2, r3, lecPct, r1Pct, r2Pct, r3Pct }) => {
    const sp = progress[sub.id] || {};
    const days = daysUntil(sub.examDate);

    const rows = sub.topics.map(topic => {
      const tp = sp[topic] || {};
      const allDone = tp.lec && tp.r1 && tp.r2 && tp.r3;
      const mk = col =>
        `<input type="checkbox" ${tp[col]?"checked":""} onchange="toggle('${sub.id}','${topic}','${col}',this.checked)" />`;
      return `<tr class="${allDone ? "row-done" : ""}">
        <td>${topic}</td>
        <td class="center">${mk("lec")}</td>
        <td class="center">${mk("r1")}</td>
        <td class="center">${mk("r2")}</td>
        <td class="center">${mk("r3")}</td>
      </tr>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "subject-card";
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="subject-name">${sub.name}</div>
          <div class="exam-date">Exam: ${fmtDate(sub.examDate)}</div>
          <div class="last-studied">${fmtTS(sp.__lastStudied)}</div>
        </div>
        <span class="days-badge ${badgeClass(days)}">${days} days left</span>
      </div>
      <div class="progress-grid">
        <div>
          <div class="prog-label"><span>Lectures</span><span>${lecPct}%</span></div>
          <div class="prog-bg"><div class="prog-fill prog-lec" style="width:${lecPct}%"></div></div>
        </div>
        <div>
          <div class="prog-label"><span>Revision 1</span><span>${r1Pct}%</span></div>
          <div class="prog-bg"><div class="prog-fill prog-r1" style="width:${r1Pct}%"></div></div>
        </div>
        <div>
          <div class="prog-label"><span>Revision 2</span><span>${r2Pct}%</span></div>
          <div class="prog-bg"><div class="prog-fill prog-r2" style="width:${r2Pct}%"></div></div>
        </div>
        <div>
          <div class="prog-label"><span>Revision 3</span><span>${r3Pct}%</span></div>
          <div class="prog-bg"><div class="prog-fill prog-r3" style="width:${r3Pct}%"></div></div>
        </div>
      </div>
      <div class="remaining-row">
        <span class="rem-badge">${n - lec} lectures left</span>
        <span class="rem-badge">${n - r1} Rev 1 left</span>
        <span class="rem-badge">${n - r2} Rev 2 left</span>
        <span class="rem-badge">${n - r3} Rev 3 left</span>
      </div>
      <table class="topics-table">
        <thead>
          <tr>
            <th>Topic</th>
            <th class="center">Lecture</th>
            <th class="center">Rev 1</th>
            <th class="center">Rev 2</th>
            <th class="center">Rev 3</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
    wrapper.appendChild(card);
  });
}

function toggle(subjectId, topic, col, checked) {
  const progress = loadProgress();
  if (!progress[subjectId]) progress[subjectId] = {};
  if (!progress[subjectId][topic]) progress[subjectId][topic] = {};
  progress[subjectId][topic][col] = checked;
  progress[subjectId].__lastStudied = Date.now();
  saveProgress(progress);
  render();
}

render();
</script>
</body>
</html>
